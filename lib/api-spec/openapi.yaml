openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Jewelry Price Calculator API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: metalPrices
    description: Metal price management
  - name: settings
    description: App settings (labour, diamond price)
  - name: calculator
    description: Jewelry price calculation
  - name: history
    description: Price calculation history

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user info
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change user password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /metal-prices:
    get:
      operationId: getMetalPrices
      tags: [metalPrices]
      summary: Get all metal prices
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of metal prices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MetalPrice"

  /metal-prices/{id}:
    put:
      operationId: updateMetalPrice
      tags: [metalPrices]
      summary: Update a metal price (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMetalPriceRequest"
      responses:
        "200":
          description: Updated metal price
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetalPrice"
        "403":
          description: Forbidden - Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get all app settings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: App settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"

  /settings/{key}:
    put:
      operationId: updateSetting
      tags: [settings]
      summary: Update a setting value (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingRequest"
      responses:
        "200":
          description: Updated setting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"
        "403":
          description: Forbidden - Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /calculator/calculate:
    post:
      operationId: calculatePrice
      tags: [calculator]
      summary: Calculate jewelry price
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculateRequest"
      responses:
        "200":
          description: Price breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalculateResponse"

  /history:
    get:
      operationId: getPriceHistory
      tags: [history]
      summary: Get price calculation history for current user
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Price history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceHistoryResponse"

  /history/stats:
    get:
      operationId: getHistoryStats
      tags: [history]
      summary: Get aggregated stats from calculation history
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Aggregated history stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryStats"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
        requiresPasswordChange:
          type: boolean
      required:
        - token
        - user
        - requiresPasswordChange

    ChangePasswordRequest:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
      required:
        - currentPassword
        - newPassword

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
          enum: [admin, user]
        requiresPasswordChange:
          type: boolean
      required:
        - id
        - username
        - role
        - requiresPasswordChange

    MetalPrice:
      type: object
      properties:
        id:
          type: integer
        metalType:
          type: string
          enum: [gold, silver, platinum]
        purity:
          type: string
        pricePerUnit:
          type: number
        updatedAt:
          type: string
      required:
        - id
        - metalType
        - purity
        - pricePerUnit
        - updatedAt

    UpdateMetalPriceRequest:
      type: object
      properties:
        pricePerUnit:
          type: number
      required:
        - pricePerUnit

    AppSettings:
      type: object
      properties:
        labourChargePerGram:
          type: number
          description: Labour charge per gram of gold
        diamondPricePerCarat:
          type: number
          description: Diamond price per carat (applied to both center and side diamonds)
        cadDesignCharge:
          type: number
          description: Fixed CAD design charge amount when enabled
      required:
        - labourChargePerGram
        - diamondPricePerCarat
        - cadDesignCharge

    UpdateSettingRequest:
      type: object
      properties:
        value:
          type: number
      required:
        - value

    CalculateRequest:
      type: object
      properties:
        goldWeight:
          type: number
          description: Weight of gold in grams
        centerDiamondWeight:
          type: number
          description: Center diamond weight in carats
        sideDiamondWeight:
          type: number
          description: Side diamond weight in carats
        cadDesignCharges:
          type: boolean
          description: Whether to include CAD design charges ($80)
        saveToHistory:
          type: boolean
      required:
        - goldWeight
        - centerDiamondWeight
        - sideDiamondWeight

    CalculateResponse:
      type: object
      properties:
        goldValue:
          type: number
          description: Gold metal value (weight * price/gram)
        centerDiamondPrice:
          type: number
        sideDiamondPrice:
          type: number
        labourCost:
          type: number
        subtotal:
          type: number
        handlingCharge:
          type: number
          description: 5% of subtotal
        cadDesignCharge:
          type: number
          description: Fixed CAD design charge if enabled ($80 or 0)
        totalPrice:
          type: number
          description: Grand total = subtotal + handlingCharge + cadDesignCharge
        goldPricePerGram:
          type: number
        labourRatePerGram:
          type: number
        diamondPricePerCarat:
          type: number
        inputs:
          $ref: "#/components/schemas/CalculateRequest"
      required:
        - goldValue
        - centerDiamondPrice
        - sideDiamondPrice
        - labourCost
        - subtotal
        - handlingCharge
        - cadDesignCharge
        - totalPrice
        - goldPricePerGram
        - labourRatePerGram
        - diamondPricePerCarat
        - inputs

    PriceHistoryItem:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        timestamp:
          type: string
        metalType:
          type: string
        purity:
          type: string
        metalWeight:
          type: number
        centerDiamondWeight:
          type: number
        sideDiamondWeight:
          type: number
        totalPrice:
          type: number
        breakdown:
          type: object
          additionalProperties: true
      required:
        - id
        - userId
        - timestamp
        - metalType
        - purity
        - metalWeight
        - centerDiamondWeight
        - sideDiamondWeight
        - totalPrice

    PriceHistoryResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PriceHistoryItem"
        total:
          type: integer
      required:
        - items
        - total

    HistoryStats:
      type: object
      properties:
        totalCalculations:
          type: integer
        averagePrice:
          type: number
        topMetalType:
          type: string
        totalByMetal:
          type: array
          items:
            type: object
            properties:
              metalType:
                type: string
              count:
                type: integer
              avgPrice:
                type: number
            required:
              - metalType
              - count
              - avgPrice
      required:
        - totalCalculations
        - averagePrice
        - topMetalType
        - totalByMetal
